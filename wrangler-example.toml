# Copy this file to wrangler.toml and fill in your values.
# wrangler.toml is gitignored — do not commit real configuration.

name = "csp-report-worker"
main = "src/index.ts"
compatibility_date = "2026-04-09"
compatibility_flags = ["nodejs_compat"]

# --- Environment Variables ---
# These are non-secret configuration values.
# For secrets (API_TOKEN), use: wrangler secret put API_TOKEN
[vars]
# Comma-separated list of email addresses to notify on new violations
NOTIFY_EMAILS = ""

# Comma-separated list of webhook URLs to POST to (Slack, Discord, etc.)
NOTIFY_WEBHOOKS = ""

# Minutes to suppress duplicate reports with the same fingerprint (default: 60)
DEDUP_WINDOW_MINUTES = "60"

# KV TTL in seconds for stored reports (default: 604800 = 7 days)
KV_TTL_SECONDS = "604800"

# Only accept reports from these origins (comma-separated). Empty = accept all.
ALLOWED_ORIGINS = ""

# Comma-separated list of report categories whose reports are STORED but
# do NOT trigger email/webhook notifications. Browser-extension and
# browser-internal sources rarely indicate a security issue with the site
# itself, but the reports are still useful as a passive log of visitor
# browser behaviour and remain queryable via GET /reports?category=...
# Empty/unset = use built-in defaults (extension, browser-internal).
# Set to "none" to fire notifications for every report.
# Valid categories: extension, browser-internal, inline, data, blob, eval,
# same-origin, external, unknown.
MUTE_CATEGORIES = ""

# Email sender address (required for all email providers)
EMAIL_FROM = ""

# Email provider: "cloudflare-email", "cloudflare-routing", "mailgun", "ses", or "resend" (empty = email disabled)
EMAIL_PROVIDER = ""

# Per-issue rolling event-sample cap (default 100). Each issue keeps
# this many representative event rows in D1 — older ones are pruned.
EVENT_SAMPLE_CAP = "100"

# Hours to suppress notifications after an issue is `resolved` before a
# new report flips it back to `open`. Default: 24. Replaces the legacy
# DEDUP_WINDOW_MINUTES var (which is still read for one release).
RESURRECTION_GRACE_HOURS = "24"

# Days to retain issues. The scheduled handler deletes issues whose
# last_seen is older than this. Default 90. Set to "0" to disable.
RETENTION_DAYS = "90"

# JSON list seeded into the `properties` table at first request, when
# no non-default property exists. Tokens are auto-generated; rotate via
# `POST /properties/:id/rotate-token` once you've grabbed them from
# `GET /properties` (or from the dashboard).
# Example:
# BOOTSTRAP_PROPERTIES = '[{"slug":"marketing","name":"Marketing site"},{"slug":"app","name":"Web app","emails":"ops@example.com"}]'

# --- Cloudflare Email Service (if EMAIL_PROVIDER = "cloudflare-email") ---
# Uses the [[send_email]] binding below. Onboard your sending domain in the
# Cloudflare dashboard. Does not take over the zone's MX records.
# Docs: https://developers.cloudflare.com/email-service/get-started/send-emails/

# --- Mailgun (if EMAIL_PROVIDER = "mailgun") ---
MAILGUN_DOMAIN = ""
MAILGUN_REGION = "us"
# Secret: wrangler secret put MAILGUN_API_KEY

# --- AWS SES (if EMAIL_PROVIDER = "ses") ---
AWS_SES_REGION = "us-east-1"
# Secrets: wrangler secret put AWS_SES_ACCESS_KEY_ID
#          wrangler secret put AWS_SES_SECRET_ACCESS_KEY

# --- Resend (if EMAIL_PROVIDER = "resend") ---
# Secret: wrangler secret put RESEND_API_KEY

# --- Bindings ---

# KV namespace for report storage + dedup state
# Create with: npx wrangler kv namespace create CSP_REPORTS
[[kv_namespaces]]
binding = "CSP_REPORTS"
id = "<your-kv-namespace-id>"

# D1 database for issues, properties, and per-issue event samples.
# Create with: npx wrangler d1 create csp-report-worker
# The schema lives in migrations/0001_init.sql and is auto-applied at cold start.
# To apply manually (e.g. CI seeding): npx wrangler d1 execute DB --file migrations/0001_init.sql
[[d1_databases]]
binding = "DB"
database_name = "csp-report-worker"
database_id = "<your-d1-database-id>"

# Workers Assets binding — serves the dashboard SPA from dist/.
# `not_found_handling = "single-page-application"` lets client-side routing
# work: any path not matched by an asset returns dist/index.html so the
# React Router on the page can take over.
# `run_worker_first = ["/report", "/report/csp", "/reports/*", "/health", "/auth/*"]`
# guarantees the Worker handles every API path before the asset fetcher gets
# a chance to 404.
[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = [
  "/report",
  "/report/csp",
  "/reports",
  "/reports/*",
  "/health",
  "/auth/*",
]

# send_email binding — required for EMAIL_PROVIDER = "cloudflare-email"
# (Email Service, structured payload) OR "cloudflare-routing" (Email Routing,
# raw MIME). Uncomment to enable either one.
# [[send_email]]
# name = "EMAIL"

# --- Custom Domains ---
# Serve the worker on your own domain instead of (or in addition to) *.workers.dev.
# The domain must be on a Cloudflare zone in your account.
#
# Option 1: Custom domains (recommended) — Wrangler auto-creates the DNS record.
# Uses bare hostname only (no wildcards or paths).
# Uncomment and replace with your domain(s):
# [[routes]]
# pattern = "csp.yourdomain.com"
# custom_domain = true
#
# Option 2: Route patterns — map URL patterns on an existing zone.
# Requires a DNS record (e.g. AAAA 100::) to already exist for the hostname.
# [[routes]]
# pattern = "csp.yourdomain.com/*"
# zone_name = "yourdomain.com"

# --- Cron Triggers ---
# Hourly maintenance: deletes issues older than RETENTION_DAYS (cascades to
# their event samples + status log). Required for retention to do anything.
[triggers]
crons = ["0 * * * *"]

